name: Build Binary

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build distributable binary
        run: npm run dist

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: relay-${{ github.sha }}-${{ runner.os }}-${{ runner.arch }}
          if-no-files-found: error
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
